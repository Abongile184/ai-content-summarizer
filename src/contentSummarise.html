<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="icon" href="./icon/favicon.ico">
    <meta name="description" content="content summarizer">
    <meta name="keywords" content="">
    <meta name="author" content="Abongile Arthur Mavela">
    <meta name="robots" content="index, follow">
    <title>Home</title>
</head>

<body>

    <div class="relative h-screen">
        <!-- Background Pattern -->
        <div class="absolute inset-0">
            <div
                class="relative h-full w-full [&>div]:absolute [&>div]:top-0 [&>div]:right-0 [&>div]:z-[-2] [&>div]:h-full [&>div]:w-full [&>div]:bg-gradient-to-l [&>div]:from-blue-200 [&>div]:to-white">
                <div></div>

            </div>
        </div>

        <!-- Hero Content -->
        <div class="relative z-10 flex h-full flex-col items-center justify-center px-4">
            <div class="max-w-3xl text-center">
                <h1 class="mb-8 text-4xl font-bold tracking-tight sm:text-6xl lg:text-7xl text-slate-900">
                    Content
                    <span class="text-sky-900">Summarizer</span>
                </h1>

                <div class="flex flex-wrap justify-center gap-4">
                    <button class="rounded-lg px-6 py-3 font-medium bg-sky-900 text-white hover:bg-sky-800" id="text-button">
                        Summarize Text
                    </button>
                    <button
                        class="rounded-lg border px-6 py-3 font-medium border-slate-200 bg-white text-slate-900 hover:bg-slate-50"
                        id="video-button">
                        Summarize Video
                    </button>
                </div>
            </div>
        </div>
    </div>


</body>

</html>
